name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["", "--features parallel"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Use cache
        uses: Swatinem/rust-cache@v2

      - name: Install pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Clippy
        run: cargo clippy --all-targets ${{ matrix.features }} -- -D warnings

      - name: Test
        run: cargo test ${{ matrix.features }}

      # cargo-machete: checks that every declared [dependencies] entry is
      # actually imported somewhere in the code. Lightweight, runs on stable.
      - name: Install cargo-machete
        if: ${{ matrix.features == '' }}
        run: cargo install cargo-machete

      - name: Check declared deps are used
        if: ${{ matrix.features == '' }}
        run: cargo machete

      - name: Install cargo-deny
        if: ${{ matrix.features == '' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Deny check
        if: ${{ matrix.features == '' }}
        run: cargo deny check

  # cargo-udeps: detects truly unused transitive dependencies at the crate
  # level. Only checks --lib --bins (excludes dev-targets like tests/benches)
  # to avoid flagging dev-only transitive deps pulled by criterion/proptest.
  # Requires nightly toolchain.
  udeps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Use cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-udeps
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-udeps

      - name: Check unused dependencies
        run: cargo +nightly udeps --lib --bins


